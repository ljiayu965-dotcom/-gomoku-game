<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 · 联机对战</title>
<style>
  :root {
    --bg: #2c1810;
    --text: #e0d5c0;
    --gold: #f0c040;
    --accent: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at center, #3d2317 0%, #1a0f08 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  .container { text-align: center; }

  /* ---- 标题 ---- */
  .title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 6px;
    background: linear-gradient(180deg, #f0c040, #c0392b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: #8b7355;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }

  /* ---- 大厅面板 ---- */
  .lobby-panel {
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 32px 40px;
    display: inline-block;
    min-width: 380px;
  }
  .lobby-panel label {
    display: block;
    font-size: 13px;
    color: #8b7355;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .lobby-panel input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 20px;
    text-align: center;
    letter-spacing: 5px;
    font-family: inherit;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }
  .lobby-panel input:focus { border-color: var(--gold); }
  .lobby-panel input::placeholder {
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
    font-size: 14px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .btn-row button {
    flex: 1;
    padding: 12px 0;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 2px;
    font-family: inherit;
    font-weight: 700;
    transition: all 0.2s;
  }
  .btn-create {
    background: #1a1a1a;
    color: var(--gold);
    border: 2px solid var(--gold);
  }
  .btn-create:hover { background: var(--gold); color: #1a1a1a; }
  .btn-join {
    background: #1a1a1a;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .btn-join:hover { border-color: #fff; }

  .error-msg {
    font-size: 12px;
    color: #f44336;
    margin-top: 10px;
    min-height: 18px;
    text-align: center;
  }

  /* ---- 游戏界面（初始隐藏） ---- */
  #game-area { display: none; }

  .game-header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 14px;
    font-size: 12px;
    color: #8b7355;
  }
  .game-header .room-badge {
    background: rgba(0,0,0,0.4);
    padding: 5px 14px;
    border-radius: 20px;
    letter-spacing: 2px;
    color: var(--gold);
    border: 1px solid rgba(240,192,64,0.3);
  }

  /* ---- 棋盘 ---- */
  .board-wrapper {
    position: relative;
    display: inline-block;
    padding: 20px;
    background: linear-gradient(135deg, #6b3a2a, #8b5a3c);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.1);
  }
  canvas { display: block; border-radius: 4px; cursor: pointer; }

  /* ---- 状态栏 ---- */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 14px;
  }
  .status-card {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 12px 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s;
    min-width: 100px;
  }
  .status-card.active {
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(240,192,64,0.3);
  }
  .status-card .label { font-size: 11px; letter-spacing: 2px; color: #8b7355; }
  .status-card .info { font-size: 14px; font-weight: 600; margin-top: 2px; }

  /* ---- 按钮 ---- */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    justify-content: center;
  }
  .actions button {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .actions button:hover { background: rgba(255,255,255,0.12); }

  /* ---- 黑方秘密面板 ---- */
  .secret-panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.88);
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 16px 28px;
    z-index: 50;
    display: none;
    animation: slideUp 0.3s ease;
    backdrop-filter: blur(10px);
    text-align: center;
  }
  .secret-panel .secret-title {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .secret-panel button {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    margin: 0 6px;
    transition: all 0.2s;
  }
  .btn-extra {
    background: transparent;
    color: var(--gold);
    border: 2px solid var(--gold);
  }
  .btn-extra:hover { background: var(--gold); color: #000; }
  .btn-skip {
    background: transparent;
    color: #666;
    border: 1px solid #444;
  }
  .btn-skip:hover { color: #999; border-color: #666; }

  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(40px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  /* ---- 弹窗 ---- */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }
  .card {
    background: linear-gradient(135deg, #2c1810, #3d2317);
    border: 1px solid var(--gold);
    border-radius: 20px;
    padding: 40px 56px;
    text-align: center;
    animation: bounceIn 0.5s ease;
  }
  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    50%  { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  .card .icon { font-size: 64px; margin-bottom: 12px; }
  .card h2 { font-size: 28px; color: var(--gold); letter-spacing: 2px; margin-bottom: 20px; }
  .card button {
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    margin: 4px;
    background: var(--accent);
    color: #fff;
    border: none;
  }
  .card .sub-btn {
    background: transparent;
    color: #8b7355;
    border: 1px solid rgba(255,255,255,0.15);
  }

  @media (max-width: 640px) {
    .title { font-size: 22px; }
    .board-wrapper { padding: 10px; }
    .lobby-panel { min-width: auto; padding: 24px 18px; }
    .status-bar { gap: 8px; }
    .status-card { padding: 8px 12px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- 标题 -->
  <div class="title">♟ 五 子 棋</div>
  <div class="subtitle">GOMOKU · 双人联机</div>

  <!-- ===== 大厅 ===== -->
  <div id="lobby" class="lobby-panel">
    <label for="room-input">输入房间号</label>
    <input type="text" id="room-input" maxlength="20" placeholder="例如：GOMOKU123" autocomplete="off" autofocus>
    <div class="btn-row">
      <button class="btn-create" onclick="createRoom()">🏠 创建房间（黑棋）</button>
      <button class="btn-join"  onclick="joinRoom()">🚪 加入房间（白棋）</button>
    </div>
    <div class="error-msg" id="lobby-msg"></div>
  </div>

  <!-- ===== 游戏界面 ===== -->
  <div id="game-area">
    <div class="game-header">
      <span>房间 <span class="room-badge" id="room-display"></span></span>
      <span id="role-display" style="color:var(--gold);"></span>
      <span id="conn-text" style="color:#8b7355;"></span>
    </div>

    <div class="board-wrapper">
      <canvas id="board"></canvas>
    </div>

    <div class="status-bar">
      <div class="status-card" id="card-black">
        <div class="label">⚫ 黑方</div>
        <div class="info" id="info-black">—</div>
      </div>
      <div class="status-card" id="card-white">
        <div class="label">⚪ 白方</div>
        <div class="info" id="info-white">—</div>
      </div>
    </div>

    <div class="actions">
      <button onclick="requestRestart()">🔄 重新开始</button>
      <button onclick="leaveRoom()">🚪 退出房间</button>
    </div>
  </div>
</div>

<!-- ===== 黑方秘密面板 ===== -->
<div class="secret-panel" id="secret-panel">
  <div class="secret-title">⚡ 你可以再下一颗（仅自己可见）</div>
  <button class="btn-extra" onclick="takeExtraMove()">🎯 再下一子</button>
  <button class="btn-skip" onclick="skipExtraMove()">跳过 → 轮到白方</button>
</div>

<!-- ===== 胜利弹窗 ===== -->
<div class="overlay" id="win-overlay" style="display:none;">
  <div class="card">
    <div class="icon" id="win-icon"></div>
    <h2 id="win-title"></h2>
    <button onclick="requestRestart()">🔁 再来一局</button>
    <button class="sub-btn" onclick="leaveRoom()">退出房间</button>
  </div>
</div>

<!-- ===== 对手断开弹窗 ===== -->
<div class="overlay" id="dc-overlay" style="display:none;">
  <div class="card">
    <div class="icon">😢</div>
    <h2>对手断开了连接</h2>
    <button onclick="leaveRoom()">返回大厅</button>
  </div>
</div>

<script>
// ==================== 绘制引擎 ====================
const SIZE = 15, CELL = 34, PAD = 22;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const W = SIZE * CELL + PAD * 2;
const H = SIZE * CELL + PAD * 2;
canvas.width = W;
canvas.height = H;

let board    = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
let history  = [];
let myRole   = null;
let myTurn   = false;
let currentTurn = 'black';
let gameOver    = false;
let extraMoveAvailable = false;
let roomCode  = '';
let ws        = null;
let inGame    = false;

// ==================== WebSocket ====================
let wsReady = false;
let pendingAction = null;

function connectAndPlay() {
  var msgEl = document.getElementById('lobby-msg');
  msgEl.textContent = '⏳ 正在连接服务器...';
  wsReady = false;
  pendingAction = null;

  // 关闭旧连接
  if (ws) {
    try { ws.onopen = null; ws.onclose = null; ws.onerror = null; ws.close(); } catch(e) {}
  }

  var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = protocol + '//' + location.host;
  msgEl.textContent = '⏳ 连接中...';

  try {
    ws = new WebSocket(url);
  } catch(e) {
    msgEl.textContent = '⚠ 创建连接失败: ' + e.message;
    return;
  }

  ws.onopen = function() {
    wsReady = true;
    msgEl.textContent = '';
    if (pendingAction) {
      var act = pendingAction;
      pendingAction = null;
      act();
    }
  };

  ws.onmessage = function(e) {
    var msg;
    try { msg = JSON.parse(e.data); } catch(ex) { return; }
    handleMessage(msg);
  };

  ws.onclose = function() {
    wsReady = false;
    if (inGame) {
      document.getElementById('dc-overlay').style.display = 'flex';
    } else {
      msgEl.textContent = '🔌 连接断开，请刷新页面';
    }
  };

  ws.onerror = function() {
    msgEl.textContent = '⚠ 无法连接服务器 (端口 3456)，请确认服务器已启动';
  };
}

function handleMessage(msg) {
  switch (msg.type) {

    case 'room-created':
      enterGame(msg.code, 'black');
      document.getElementById('conn-text').textContent = '等待对手加入...';
      break;

    case 'joined':
      enterGame(msg.code, 'white');
      break;

    case 'game-start':
      currentTurn = msg.turn;
      myTurn = (myRole === currentTurn);
      document.getElementById('conn-text').textContent = '● 对战中';
      updateTurnUI();
      draw();
      break;

    case 'stone-placed':
      board[msg.y][msg.x] = msg.color;
      history.push({x: msg.x, y: msg.y, color: msg.color});
      extraMoveAvailable = false;
      hideSecretPanel();
      draw();
      break;

    case 'extra-move-available':
      if (myRole === 'black' && !gameOver) {
        extraMoveAvailable = true;
        showSecretPanel();
      }
      myTurn = true;
      updateTurnUI();
      break;

    case 'turn-change':
      currentTurn = msg.turn;
      myTurn = (myRole === currentTurn);
      extraMoveAvailable = false;
      hideSecretPanel();
      updateTurnUI();
      break;

    case 'game-over':
      gameOver = true;
      extraMoveAvailable = false;
      hideSecretPanel();
      myTurn = false;
      showWin(msg.winner === myRole);
      updateTurnUI();
      draw();
      break;

    case 'undo':
      board[msg.y][msg.x] = 0;
      history.pop();
      currentTurn = msg.turn;
      myTurn = (myRole === currentTurn);
      extraMoveAvailable = false;
      hideSecretPanel();
      gameOver = false;
      draw();
      updateTurnUI();
      break;

    case 'restart':
      board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
      history = [];
      currentTurn = 'black';
      myTurn = (myRole === 'black');
      gameOver = false;
      extraMoveAvailable = false;
      hideSecretPanel();
      document.getElementById('win-overlay').style.display = 'none';
      document.getElementById('dc-overlay').style.display = 'none';
      draw();
      updateTurnUI();
      break;

    case 'opponent-disconnected':
      document.getElementById('dc-overlay').style.display = 'flex';
      break;

    case 'error':
      document.getElementById('lobby-msg').textContent = '⚠ ' + msg.message;
      setTimeout(() => { document.getElementById('lobby-msg').textContent = ''; }, 3500);
      break;
  }
}

// ==================== 大厅操作 ====================
function createRoom() {
  var code = getInputCode();
  if (!code) return;
  if (!wsReady) {
    document.getElementById('lobby-msg').textContent = '⏳ 连接尚未就绪，自动重试中...';
    pendingAction = createRoom;
    return;
  }
  ws.send(JSON.stringify({ type: 'create', code: code }));
}

function joinRoom() {
  var code = getInputCode();
  if (!code) return;
  if (!wsReady) {
    document.getElementById('lobby-msg').textContent = '⏳ 连接尚未就绪，自动重试中...';
    pendingAction = joinRoom;
    return;
  }
  ws.send(JSON.stringify({ type: 'join', code: code }));
}

function getInputCode() {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if (!code) {
    document.getElementById('lobby-msg').textContent = '⚠ 请输入房间号';
    return '';
  }
  return code;
}

// 回车键快捷操作
document.getElementById('room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    // 默认创建房间
    createRoom();
  }
});

// ==================== 进入/退出游戏 ====================
function enterGame(code, role) {
  roomCode = code;
  myRole = role;
  inGame = true;
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  history = [];
  gameOver = false;
  extraMoveAvailable = false;
  hideSecretPanel();
  document.getElementById('win-overlay').style.display = 'none';
  document.getElementById('dc-overlay').style.display = 'none';

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-area').style.display = 'block';
  document.getElementById('room-display').textContent = roomCode;
  document.getElementById('role-display').textContent = role === 'black' ? '⚫ 黑棋' : '⚪ 白棋';

  draw();
  updateTurnUI();
}

function leaveRoom() {
  if (ws) ws.close();
  inGame = false;
  myRole = null;
  myTurn = false;
  gameOver = false;
  roomCode = '';
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  history = [];
  extraMoveAvailable = false;
  hideSecretPanel();

  document.getElementById('game-area').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('win-overlay').style.display = 'none';
  document.getElementById('dc-overlay').style.display = 'none';
  document.getElementById('lobby-msg').textContent = '';
  document.getElementById('room-input').value = '';
  document.getElementById('room-input').focus();

  draw();
  connectAndPlay();  // 重新连接 WebSocket
}

// ==================== 棋盘操作 ====================
canvas.addEventListener('click', e => {
  if (!myTurn || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const x = Math.round((mx - PAD) / CELL);
  const y = Math.round((my - PAD) / CELL);
  if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
  if (board[y][x] !== 0) return;
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'move', x, y }));
});

function takeExtraMove() {
  extraMoveAvailable = true;
  hideSecretPanel();
  myTurn = true;
}

function skipExtraMove() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'end-turn' }));
  extraMoveAvailable = false;
  hideSecretPanel();
  myTurn = false;
}

function requestRestart() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'restart' }));
}

// ==================== 秘密面板 ====================
function showSecretPanel() {
  document.getElementById('secret-panel').style.display = 'block';
}
function hideSecretPanel() {
  document.getElementById('secret-panel').style.display = 'none';
}

// ==================== 绘制 ====================
function draw() {
  ctx.fillStyle = '#e8c888';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < W; i += 3) {
    ctx.fillStyle = i % 6 < 3 ? '#000' : '#fff';
    ctx.fillRect(0, i, W, 2);
  }
  ctx.globalAlpha = 1;

  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const pos = PAD + i * CELL;
    ctx.beginPath(); ctx.moveTo(PAD, pos); ctx.lineTo(PAD + (SIZE-1)*CELL, pos); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pos, PAD); ctx.lineTo(pos, PAD + (SIZE-1)*CELL); ctx.stroke();
  }

  const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  for (const [sx, sy] of stars) {
    ctx.fillStyle = '#8b6914';
    ctx.beginPath();
    ctx.arc(PAD + sx*CELL, PAD + sy*CELL, 3, 0, Math.PI*2);
    ctx.fill();
  }

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      if (board[y][x] === 0) continue;
      const cx = PAD + x * CELL, cy = PAD + y * CELL, r = CELL/2 - 2;
      if (board[y][x] === 1) {
        const grad = ctx.createRadialGradient(cx-2, cy-3, r*0.1, cx, cy, r);
        grad.addColorStop(0, '#555'); grad.addColorStop(0.7, '#1a1a1a'); grad.addColorStop(1, '#000');
        ctx.fillStyle = grad;
      } else {
        const grad = ctx.createRadialGradient(cx-2, cy-3, r*0.1, cx, cy, r);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.8, '#e8e8e8'); grad.addColorStop(1, '#c0c0c0');
        ctx.fillStyle = grad;
      }
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = board[y][x] === 1 ? '#000' : '#aaa';
      ctx.lineWidth = 0.5; ctx.stroke();
    }
  }

  if (history.length > 0) {
    const last = history[history.length - 1];
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(PAD + last.x*CELL, PAD + last.y*CELL, 4, 0, Math.PI*2);
    ctx.fill();
  }

  canvas.style.cursor = (myTurn && !gameOver) ? 'pointer' : 'default';
}

canvas.addEventListener('mousemove', e => {
  if (!myTurn || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const gx = Math.round(((e.clientX - rect.left) * scaleX - PAD) / CELL);
  const gy = Math.round(((e.clientY - rect.top) * scaleY - PAD) / CELL);
  draw();
  if (gx >= 0 && gx < SIZE && gy >= 0 && gy < SIZE && board[gy][gx] === 0) {
    const cx = PAD + gx*CELL, cy = PAD + gy*CELL;
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = myRole === 'black' ? '#333' : '#ddd';
    ctx.beginPath(); ctx.arc(cx, cy, CELL/2-2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
});
canvas.addEventListener('mouseleave', () => draw());

// ==================== UI 辅助 ====================
function updateTurnUI() {
  const cardB = document.getElementById('card-black'), cardW = document.getElementById('card-white');
  const infoB = document.getElementById('info-black'), infoW = document.getElementById('info-white');
  cardB.classList.remove('active'); cardW.classList.remove('active');
  if (gameOver) { infoB.textContent = '—'; infoW.textContent = '—'; return; }
  if (currentTurn === 'black') {
    cardB.classList.add('active');
    infoB.textContent = '● 落子中'; infoW.textContent = '等待...';
  } else {
    cardW.classList.add('active');
    infoW.textContent = '○ 落子中'; infoB.textContent = '等待...';
  }
}

function showWin(iWon) {
  document.getElementById('win-icon').textContent = iWon ? '🏆' : '💔';
  document.getElementById('win-title').textContent = iWon ? '你赢了！' : '你输了...';
  document.getElementById('win-overlay').style.display = 'flex';
}

draw();
console.log('🔵 棋盘绘制完成，开始连接 WebSocket...');
connectAndPlay();
console.log('🔵 connectAndPlay 调用完成');
</script>
